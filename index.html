<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi du Trafic Fluvial - Bretagne</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="/assets/lib/leaflet@1.9.4/leaflet.css" />
    <!-- Leaflet fullscreen CSS -->
    <link rel="stylesheet" href="/assets/lib/leaflet@1.9.4/leaflet-fullScreen.css" />

    <!-- Custom styles -->
    <link rel="stylesheet" href="./assets/styles/main.css">
    <link rel="stylesheet" href="./assets/styles/map.css">
</head>

<body>
    <div class="app-container">
        <!-- Header avec logo et fond noir -->
        <header class="app-header">
            <div class="header-content">
                <img src="./assets/images/logo.png" alt="Logo Canaux Bretagne" class="header-logo">
            </div>
        </header>

        <!-- Section du dropdown -->
        <div class="controls-section">
            <div class="controls-content">
                <select id="channel-select" class="dropdown-menu" aria-label="Sélectionner un canal">
                    <option value="">Chargement...</option>
                </select>
            </div>
        </div>

        <!-- Conteneur de la carte -->
        <main class="map-container" id="map"></main>

        <!-- Modal détails bateaux -->
        <div id="boats-modal" class="modal hidden">
            <div class="modal-content">
                <button class="modal-close" aria-label="Fermer">✕</button>
                <h2>Détails des bateaux</h2>
                <div id="boats-list" class="boats-list"></div>
            </div>
        </div>

        <!-- Footer sticky -->
        <footer class="app-footer">
            <button class="footer-btn footer-home" aria-label="Accueil">
                <img src="./assets/images/icons/home_icon.svg" alt="" class="footer-icon">
                <span class="footer-text">Accueil</span>
            </button>

            <div class="footer-date-group">
                <button class="footer-btn footer-date-btn" id="btn-yesterday" aria-label="Hier">
                    Hier
                </button>
                <button class="footer-btn footer-date-btn active" id="btn-today" aria-label="Aujourd'hui">
                    <!-- Date sera générée par JavaScript -->
                </button>
            </div>
        </footer>
    </div>

    <!-- Leaflet JS -->
    <script src="/assets/lib/leaflet@1.9.4/leaflet.js"></script>
    <!-- Leaflet fullscreen -->
    <script src="/assets/lib/leaflet@1.9.4/leaflet-fullScreen.js"></script>

    <!-- Application scripts -->
    <script type="module" src="./assets/scripts/main.js"></script>
</body>

</html>
